name: Database backup

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Postgres 16 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsS https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Dump database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set. Add it at Settings > Secrets and variables > Actions."
            exit 1
          fi
          STAMP=$(date -u +%Y-%m-%d-%H%M)
          echo "STAMP=$STAMP" >> $GITHUB_ENV
          pg_dump --no-owner --no-privileges --clean --if-exists "$DB_URL" | gzip > backup-$STAMP.sql.gz
          ls -lh backup-*.sql.gz

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.STAMP }}
          path: backup-*.sql.gz
          retention-days: 90
